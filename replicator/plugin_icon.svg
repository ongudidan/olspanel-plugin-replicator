<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="100%" height="100%" fill="none">
  <!-- Gradient definitions for visual depth -->
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
  </defs>

  <!-- Left Server (Source) -->
  <rect x="2" y="4" width="8" height="4" rx="1.5" fill="url(#blueGrad)" />
  <circle cx="4.5" cy="6" r="0.75" fill="#ffffff" opacity="0.8" />
  <circle cx="6.5" cy="6" r="0.75" fill="#60a5fa" />
  
  <rect x="2" y="10" width="8" height="4" rx="1.5" fill="url(#blueGrad)" />
  <circle cx="4.5" cy="12" r="0.75" fill="#ffffff" opacity="0.8" />
  <circle cx="6.5" cy="12" r="0.75" fill="#60a5fa" />

  <rect x="2" y="16" width="8" height="4" rx="1.5" fill="url(#blueGrad)" opacity="0.6" />
  <circle cx="4.5" cy="18" r="0.75" fill="#ffffff" opacity="0.8" />
  <circle cx="6.5" cy="18" r="0.75" fill="#93c5fd" />

  <!-- Right Server (Destination) -->
  <rect x="14" y="4" width="8" height="4" rx="1.5" fill="url(#emeraldGrad)" />
  <circle cx="16.5" cy="6" r="0.75" fill="#ffffff" opacity="0.8" />
  <circle cx="18.5" cy="6" r="0.75" fill="#34d399" />
  
  <rect x="14" y="10" width="8" height="4" rx="1.5" fill="url(#emeraldGrad)" />
  <circle cx="16.5" cy="12" r="0.75" fill="#ffffff" opacity="0.8" />
  <circle cx="18.5" cy="12" r="0.75" fill="#34d399" />

  <rect x="14" y="16" width="8" height="4" rx="1.5" fill="url(#emeraldGrad)" />
  <circle cx="16.5" cy="18" r="0.75" fill="#ffffff" opacity="0.8" />
  <circle cx="18.5" cy="18" r="0.75" fill="#34d399" />

  <!-- Synchronization / Copy Arrow curves -->
  <path d="M 10.5 8 C 11.5 8, 12.5 9, 13 10" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" />
  <path d="M 13 10 L 13 8 M 13 10 L 11 10" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />

  <path d="M 13.5 16 C 12.5 16, 11.5 15, 11 14" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" />
  <path d="M 11 14 L 11 16 M 11 14 L 13 14" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
</svg>
